# Bareiron Server Configuration
# Edit this file to customize your server settings

# ============================================
# Network Settings
# ============================================
port = 25565
max_players = 16
compression_threshold = 256
network_timeout = 15000000
mojang_api_timeout_ms = 3000

# ============================================
# Game Settings
# ============================================
# Gamemode: 0 = survival, 1 = creative, 2 = adventure, 3 = spectator
gamemode = 0
view_distance = 10
mob_despawn_distance = 256
mob_spawn_enabled = true
mob_spawn_max_per_player = 5
mob_spawn_range = 100
mob_spawn_min_distance = 6
mob_spawn_interval = 10
world_seed = 0xA103DE6C
rng_seed = 0xE2B9419

# ============================================
# World Generation Settings
# ============================================
chunk_size = 8
terrain_base_height = 55
cave_base_depth = 20
biome_size = 64

# ============================================
# Performance Settings
# ============================================
chunk_cache_size = 25
max_block_changes = 20000
# Set infinite_block_changes to true for unlimited block changes (dynamic allocation)
# Note: This can consume significant memory with extensive building
infinite_block_changes = true
tick_interval = 100000
disk_sync_interval = 15000000

# ============================================
# Feature Flags (true/false)
# ============================================
sync_world_to_disk = true
sync_blocks_on_interval = false
send_brand = true
broadcast_all_movement = true
scale_movement_updates = true
do_fluid_flow = true
allow_chests = true
allow_doors = true
enable_flight = false
enable_pickup_animation = true
enable_cactus_damage = true
fetch_skins_from_mojang = true

# ============================================
# Debug Options (true/false)
# ============================================
log_unknown_packets = false
log_length_discrepancy = false
log_chunk_generation = false
enable_beef_dumps = false

# ============================================
# Server Information
# ============================================
motd = A irongingot server
brand = irongingot
